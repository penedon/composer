<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1024" viewBox="0 0 1440 1024" role="img" aria-labelledby="title desc">
  <title id="title">Composer Emotional Arc Builder</title>
  <desc id="desc">A desktop interface for shaping melancholy, longing, and despair across song sections using accessible labeled curves, section blocks, and a contextual section inspector.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity=".18"/></filter>
    <style>
      .ui { font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { font-size: 22px; font-weight: 600; fill: #f4f1e9; }
      .section { font-size: 12px; font-weight: 700; letter-spacing: .07em; fill: #8f9489; }
      .body { font-size: 14px; fill: #d6d7d0; }
      .muted { font-size: 12px; fill: #8f9489; }
      .nav { font-size: 13px; font-weight: 600; fill: #b8bbb1; }
      .chart-label { font-size: 12px; font-weight: 600; fill: #cdd0c7; }
      .axis { font-size: 11px; fill: #858a7f; }
      .dark { font-size: 13px; fill: #3f423a; }
      .dark-strong { font-size: 14px; font-weight: 600; fill: #292b25; }
    </style>
  </defs>

  <rect width="1440" height="1024" fill="#171916"/>
  <g class="ui">
    <rect width="1440" height="64" fill="#20221e"/>
    <circle cx="26" cy="32" r="10" fill="#d8a45e"/><text x="48" y="38" class="title">Composer</text>
    <line x1="157" y1="18" x2="157" y2="46" stroke="#3b3e36"/>
    <text x="180" y="29" class="muted">PROJECT</text><text x="180" y="47" class="body">The Doorway</text>
    <text x="1198" y="38" class="muted">Saved locally · just now</text>
    <rect x="1332" y="16" width="80" height="32" rx="9" fill="#2b2e28" stroke="#44483f"/><text x="1372" y="37" text-anchor="middle" font-size="12" font-weight="600" fill="#d6d7d0">•••</text>

    <rect x="0" y="64" width="208" height="896" fill="#1d1f1b"/>
    <text x="24" y="98" class="section">CREATE</text>
    <g transform="translate(12 116)"><circle cx="22" cy="22" r="11" fill="#3a3d35"/><text x="22" y="26" text-anchor="middle" class="muted">✓</text><text x="44" y="27" class="nav">Story</text></g>
    <g transform="translate(12 166)"><circle cx="22" cy="22" r="11" fill="#3a3d35"/><text x="22" y="26" text-anchor="middle" class="muted">✓</text><text x="44" y="27" class="nav">Frame</text></g>
    <g transform="translate(12 216)"><rect width="184" height="44" rx="10" fill="#2d3441"/><circle cx="22" cy="22" r="11" fill="#6687bd"/><text x="22" y="26" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">3</text><text x="44" y="27" class="nav" fill="#f4f1e9">Emotions</text></g>
    <g transform="translate(12 266)"><circle cx="22" cy="22" r="11" fill="#2b2e28"/><text x="22" y="26" text-anchor="middle" class="muted">4</text><text x="44" y="27" class="nav">Structure</text></g>
    <g transform="translate(12 316)"><circle cx="22" cy="22" r="11" fill="#2b2e28"/><text x="22" y="26" text-anchor="middle" class="muted">5</text><text x="44" y="27" class="nav">Compose</text></g>
    <g transform="translate(12 366)"><circle cx="22" cy="22" r="11" fill="#2b2e28"/><text x="22" y="26" text-anchor="middle" class="muted">6</text><text x="44" y="27" class="nav">Arrange</text></g>
    <line x1="24" y1="436" x2="184" y2="436" stroke="#34372f"/>
    <text x="24" y="472" class="section">EMOTION PALETTE</text>
    <circle cx="30" cy="504" r="7" fill="#6687bd"/><text x="48" y="509" class="nav">Melancholy</text>
    <circle cx="30" cy="540" r="7" fill="#d46f80"/><text x="48" y="545" class="nav">Longing</text>
    <circle cx="30" cy="576" r="7" fill="#c68b50"/><text x="48" y="581" class="nav">Despair</text>
    <text x="24" y="620" class="muted">Dominant family</text><text x="24" y="642" class="body">Sadness</text>

    <rect x="208" y="64" width="946" height="896" fill="#292b26"/>
    <text x="244" y="106" class="section">EMOTIONAL ARC</text>
    <text x="244" y="137" class="title">Shape what the listener feels over time.</text>
    <rect x="938" y="94" width="188" height="36" rx="10" fill="#363930" stroke="#4b4f45"/>
    <text x="1032" y="117" text-anchor="middle" font-size="12" font-weight="600" fill="#d6d7d0">+ Add provisional section</text>

    <rect x="242" y="158" width="878" height="654" rx="20" fill="#20221e" stroke="#393c34" filter="url(#shadow)"/>
    <text x="270" y="194" class="section">INTENSITY</text>
    <text x="1090" y="194" text-anchor="end" class="muted">Drag points · sections can change later</text>

    <g transform="translate(270 222)">
      <line x1="0" y1="0" x2="0" y2="400" stroke="#4a4e44"/>
      <line x1="0" y1="400" x2="820" y2="400" stroke="#4a4e44"/>
      <g stroke="#34372f"><line x1="0" y1="80" x2="820" y2="80"/><line x1="0" y1="160" x2="820" y2="160"/><line x1="0" y1="240" x2="820" y2="240"/><line x1="0" y1="320" x2="820" y2="320"/></g>
      <text x="-14" y="5" text-anchor="end" class="axis">100%</text><text x="-14" y="85" text-anchor="end" class="axis">80</text><text x="-14" y="165" text-anchor="end" class="axis">60</text><text x="-14" y="245" text-anchor="end" class="axis">40</text><text x="-14" y="325" text-anchor="end" class="axis">20</text><text x="-14" y="405" text-anchor="end" class="axis">0</text>

      <g stroke="#34372f"><line x1="104" y1="0" x2="104" y2="400"/><line x1="264" y1="0" x2="264" y2="400"/><line x1="380" y1="0" x2="380" y2="400"/><line x1="540" y1="0" x2="540" y2="400"/><line x1="656" y1="0" x2="656" y2="400"/></g>
      <rect x="380" y="0" width="160" height="400" fill="#d46f80" opacity=".05"/>

      <path d="M0 300 C48 270 72 250 104 244 S200 208 264 214 S334 238 380 210 S478 158 540 170 S604 182 656 136 S754 92 820 112" fill="none" stroke="#6687bd" stroke-width="4"/>
      <path d="M0 354 C50 340 74 328 104 310 S194 224 264 196 S332 158 380 138 S468 90 540 108 S604 130 656 100 S752 70 820 84" fill="none" stroke="#d46f80" stroke-width="4"/>
      <path d="M0 382 C58 380 78 370 104 366 S206 352 264 338 S336 320 380 306 S478 264 540 244 S608 212 656 166 S748 92 820 48" fill="none" stroke="#c68b50" stroke-width="4"/>

      <g fill="#20221e" stroke-width="4"><g stroke="#6687bd"><circle cx="0" cy="300" r="7"/><circle cx="104" cy="244" r="7"/><circle cx="264" cy="214" r="7"/><circle cx="380" cy="210" r="7"/><circle cx="540" cy="170" r="7"/><circle cx="656" cy="136" r="7"/><circle cx="820" cy="112" r="7"/></g><g stroke="#d46f80"><circle cx="0" cy="354" r="7"/><circle cx="104" cy="310" r="7"/><circle cx="264" cy="196" r="7"/><circle cx="380" cy="138" r="7"/><circle cx="540" cy="108" r="7"/><circle cx="656" cy="100" r="7"/><circle cx="820" cy="84" r="7"/></g><g stroke="#c68b50"><circle cx="0" cy="382" r="7"/><circle cx="104" cy="366" r="7"/><circle cx="264" cy="338" r="7"/><circle cx="380" cy="306" r="7"/><circle cx="540" cy="244" r="7"/><circle cx="656" cy="166" r="7"/><circle cx="820" cy="48" r="7"/></g></g>

      <g transform="translate(0 418)">
        <rect width="104" height="44" rx="8" fill="#3b3c35"/><text x="52" y="27" text-anchor="middle" class="chart-label">Intro</text>
        <rect x="108" width="156" height="44" rx="8" fill="#384252"/><text x="186" y="27" text-anchor="middle" class="chart-label">Verse 1</text>
        <rect x="268" width="112" height="44" rx="8" fill="#4a3f35"/><text x="324" y="27" text-anchor="middle" class="chart-label">Pre</text>
        <rect x="384" width="156" height="44" rx="8" fill="#5a3941" stroke="#d46f80"/><text x="462" y="27" text-anchor="middle" class="chart-label">Chorus</text>
        <rect x="544" width="112" height="44" rx="8" fill="#384252"/><text x="600" y="27" text-anchor="middle" class="chart-label">Verse 2</text>
        <rect x="660" width="96" height="44" rx="8" fill="#4b4057"/><text x="708" y="27" text-anchor="middle" class="chart-label">Bridge</text>
        <rect x="760" width="60" height="44" rx="8" fill="#5a3941"/><text x="790" y="27" text-anchor="middle" class="chart-label">Final</text>
      </g>
    </g>

    <g transform="translate(270 716)">
      <circle cx="8" cy="8" r="7" fill="#6687bd"/><text x="24" y="13" class="chart-label">Melancholy</text>
      <circle cx="148" cy="8" r="7" fill="#d46f80"/><text x="164" y="13" class="chart-label">Longing</text>
      <circle cx="274" cy="8" r="7" fill="#c68b50"/><text x="290" y="13" class="chart-label">Despair</text>
      <rect x="648" y="-10" width="172" height="36" rx="10" fill="#d8a45e"/><text x="734" y="13" text-anchor="middle" font-size="12" font-weight="700" fill="#211a10">Continue to structure →</text>
    </g>

    <rect x="242" y="832" width="878" height="98" rx="16" fill="#f4efe5"/>
    <text x="266" y="861" class="dark-strong">Current arc reading</text>
    <text x="266" y="887" class="dark">Longing leads the chorus, but despair overtakes it only near the ending.</text>
    <text x="266" y="911" class="dark">This is an interpretation of your curve—not a rule for the harmony.</text>
    <rect x="936" y="856" width="160" height="42" rx="10" fill="#e5dccd"/><text x="1016" y="882" text-anchor="middle" class="dark-strong">Edit interpretation</text>

    <rect x="1154" y="64" width="286" height="896" fill="#20221e"/>
    <text x="1182" y="106" class="section">SELECTED SECTION</text><text x="1182" y="138" class="title">Chorus</text>
    <line x1="1182" y1="158" x2="1412" y2="158" stroke="#34372f"/>
    <text x="1182" y="194" class="muted">Narrative purpose</text>
    <text x="1182" y="220" class="body">Admit the waiting is over</text>
    <text x="1182" y="262" class="muted">Section intensity</text>
    <g transform="translate(1182 282)">
      <text x="0" y="8" class="body">Melancholy</text><line x1="0" y1="26" x2="220" y2="26" stroke="#3c4037" stroke-width="8" stroke-linecap="round"/><line x1="0" y1="26" x2="128" y2="26" stroke="#6687bd" stroke-width="8" stroke-linecap="round"/><text x="220" y="8" text-anchor="end" class="muted">58%</text>
      <text x="0" y="70" class="body">Longing</text><line x1="0" y1="88" x2="220" y2="88" stroke="#3c4037" stroke-width="8" stroke-linecap="round"/><line x1="0" y1="88" x2="178" y2="88" stroke="#d46f80" stroke-width="8" stroke-linecap="round"/><text x="220" y="70" text-anchor="end" class="muted">81%</text>
      <text x="0" y="132" class="body">Despair</text><line x1="0" y1="150" x2="220" y2="150" stroke="#3c4037" stroke-width="8" stroke-linecap="round"/><line x1="0" y1="150" x2="52" y2="150" stroke="#c68b50" stroke-width="8" stroke-linecap="round"/><text x="220" y="132" text-anchor="end" class="muted">24%</text>
    </g>
    <text x="1182" y="478" class="muted">Desired movement</text>
    <rect x="1182" y="496" width="230" height="80" rx="12" fill="#292b26" stroke="#3c4037"/>
    <text x="1198" y="524" class="body">Rise quickly, then remain</text><text x="1198" y="547" class="body">emotionally unresolved.</text>
    <rect x="1182" y="604" width="230" height="42" rx="10" fill="#2b2e28" stroke="#44483f"/><text x="1297" y="630" text-anchor="middle" font-size="12" font-weight="600" fill="#d6d7d0">Add section note</text>
    <text x="1182" y="696" class="section">ACCESSIBLE SUMMARY</text>
    <text x="1182" y="726" class="body">Color is paired with labels,</text><text x="1182" y="748" class="body">line identity, and percentages.</text>

    <rect x="0" y="960" width="1440" height="64" fill="#20221e"/>
    <text x="28" y="998" class="muted">Preview emotional pacing</text>
    <rect x="640" y="974" width="36" height="36" rx="18" fill="#d8a45e"/><text x="658" y="998" text-anchor="middle" font-size="15" fill="#211a10">▶</text>
    <text x="708" y="997" class="body">92 BPM</text><text x="784" y="997" class="muted">4/4</text><text x="840" y="997" class="muted">D minor</text>
    <text x="1388" y="997" text-anchor="end" class="muted">Section 4 of 7</text>
  </g>
</svg>
