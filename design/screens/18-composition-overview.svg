<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1024" viewBox="0 0 1440 1024" role="img" aria-labelledby="title desc">
  <title id="title">Composer Composition Overview</title>
  <desc id="desc">A desktop songwriting dashboard that projects canonical story intent, musical frame, emotion arc, structure coverage, selected phrase harmony and rhythm, arrangement tracks, factual composition checks, and supported playback controls in one Studio Notebook workspace.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.16"/>
    </filter>
    <linearGradient id="progress" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d8a45e"/>
      <stop offset="1" stop-color="#e2b84f"/>
    </linearGradient>
    <style>
      .ui { font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .serif { font-family: Georgia, "Times New Roman", serif; }
      .title { font-size: 22px; font-weight: 600; fill: #f4f1e9; }
      .section { font-size: 11px; font-weight: 700; letter-spacing: .08em; fill: #8f9489; }
      .body { font-size: 14px; fill: #d6d7d0; }
      .muted { font-size: 12px; fill: #8f9489; }
      .nav { font-size: 13px; font-weight: 600; fill: #b8bbb1; }
      .paper-title { font-size: 17px; font-weight: 600; fill: #292b25; }
      .paper-label { font-size: 10px; font-weight: 700; letter-spacing: .07em; fill: #74786e; }
      .paper-body { font-size: 13px; fill: #50534b; }
      .paper-muted { font-size: 11px; fill: #777b72; }
      .lyric { font-size: 20px; fill: #292b25; }
      .chord { font-size: 13px; font-weight: 700; fill: #76582f; }
      .btn { font-size: 12px; font-weight: 700; }
      .number { font-size: 24px; font-weight: 600; fill: #f4f1e9; }
    </style>
  </defs>

  <rect width="1440" height="1024" fill="#171916"/>
  <g class="ui">
    <!-- Persistent project bar -->
    <rect width="1440" height="64" fill="#20221e"/>
    <circle cx="26" cy="32" r="10" fill="#d8a45e"/>
    <text x="48" y="38" class="title">Composer</text>
    <line x1="157" y1="18" x2="157" y2="46" stroke="#3b3e36"/>
    <text x="180" y="29" class="muted">PROJECT</text>
    <text x="180" y="47" class="body">The Doorway</text>
    <path d="M1114 33 l7 -7 l7 7" fill="none" stroke="#8f9489" stroke-width="2"/>
    <text x="1140" y="38" class="muted">Undo</text>
    <path d="M1214 33 l-7 -7 l-7 7" fill="none" stroke="#575b52" stroke-width="2"/>
    <text x="1232" y="38" class="muted" fill="#575b52">Redo</text>
    <circle cx="1308" cy="32" r="4" fill="#79936a"/>
    <text x="1320" y="38" class="muted">Saved locally</text>

    <!-- Phase rail -->
    <rect x="0" y="64" width="208" height="896" fill="#1d1f1b"/>
    <text x="24" y="98" class="section">CREATE</text>
    <g transform="translate(12 116)"><circle cx="22" cy="22" r="11" fill="#3a3d35"/><text x="22" y="26" text-anchor="middle" class="muted">1</text><text x="44" y="27" class="nav">Story</text></g>
    <g transform="translate(12 166)"><circle cx="22" cy="22" r="11" fill="#3a3d35"/><text x="22" y="26" text-anchor="middle" class="muted">2</text><text x="44" y="27" class="nav">Frame</text></g>
    <g transform="translate(12 216)"><circle cx="22" cy="22" r="11" fill="#3a3d35"/><text x="22" y="26" text-anchor="middle" class="muted">3</text><text x="44" y="27" class="nav">Emotions</text></g>
    <g transform="translate(12 266)"><circle cx="22" cy="22" r="11" fill="#3a3d35"/><text x="22" y="26" text-anchor="middle" class="muted">4</text><text x="44" y="27" class="nav">Structure</text></g>
    <g transform="translate(12 316)"><rect width="184" height="44" rx="10" fill="#333027"/><circle cx="22" cy="22" r="11" fill="#d8a45e"/><text x="22" y="26" text-anchor="middle" font-size="11" font-weight="700" fill="#211a10">5</text><text x="44" y="27" class="nav" fill="#f4f1e9">Compose</text></g>
    <g transform="translate(12 366)"><circle cx="22" cy="22" r="11" fill="#2b2e28"/><text x="22" y="26" text-anchor="middle" class="muted">6</text><text x="44" y="27" class="nav">Arrange</text></g>
    <g transform="translate(12 416)"><circle cx="22" cy="22" r="11" fill="#2b2e28"/><text x="22" y="26" text-anchor="middle" class="muted">7</text><text x="44" y="27" class="nav">Export</text></g>

    <line x1="24" y1="478" x2="184" y2="478" stroke="#34372f"/>
    <rect x="20" y="508" width="168" height="170" rx="14" fill="#242620" stroke="#34372f"/>
    <text x="36" y="538" class="section">CREATIVE COMPASS</text>
    <text x="36" y="576" class="number">Sadness</text>
    <circle cx="38" cy="608" r="6" fill="#6687bd"/><text x="54" y="613" class="muted">Melancholy</text>
    <circle cx="38" cy="638" r="6" fill="#d46f80"/><text x="54" y="643" class="muted">Longing</text>
    <circle cx="126" cy="638" r="6" fill="#c68b50"/><text x="142" y="643" class="muted">Despair</text>

    <!-- Main dashboard canvas -->
    <rect x="208" y="64" width="946" height="896" fill="#292b26"/>
    <text x="242" y="102" class="section">COMPOSE · OVERVIEW</text>
    <text x="242" y="133" class="title">See the whole song without leaving the work.</text>
    <rect x="938" y="92" width="182" height="38" rx="10" fill="#d8a45e"/>
    <text x="1029" y="116" text-anchor="middle" class="btn" fill="#211a10">Continue composing →</text>

    <!-- Story intent card -->
    <g transform="translate(242 154)" filter="url(#shadow)">
      <rect width="424" height="158" rx="18" fill="#f4efe5"/>
      <rect width="6" height="158" rx="3" fill="#d8a45e"/>
      <text x="24" y="30" class="paper-label">STORY INTENT</text>
      <text x="400" y="30" text-anchor="end" class="paper-muted">EDIT</text>
      <text x="24" y="59" class="paper-title">Premise</text>
      <text x="24" y="84" class="serif" font-size="14" fill="#50534b">Someone keeps preparing for a person who</text>
      <text x="24" y="104" class="serif" font-size="14" fill="#50534b">has already decided not to return.</text>
      <line x1="24" y1="119" x2="400" y2="119" stroke="#d9d1c3"/>
      <text x="24" y="142" class="paper-label">3 LABELED STORY BLOCKS · PREMISE → TURNING POINT</text>
    </g>

    <!-- Musical frame card -->
    <g transform="translate(682 154)">
      <rect width="438" height="158" rx="18" fill="#20221e" stroke="#3b3e36"/>
      <text x="22" y="30" class="section">MUSICAL FRAME</text>
      <text x="416" y="30" text-anchor="end" class="muted">EDIT</text>
      <text x="22" y="69" class="number">D minor</text>
      <text x="140" y="68" class="muted">key</text>
      <text x="216" y="69" class="number">92</text>
      <text x="250" y="68" class="muted">BPM</text>
      <text x="332" y="69" class="number">4/4</text>
      <line x1="22" y1="88" x2="416" y2="88" stroke="#34372f"/>
      <rect x="22" y="106" width="112" height="30" rx="9" fill="#2c3029"/><text x="78" y="126" text-anchor="middle" class="muted">Slow pulse</text>
      <rect x="144" y="106" width="132" height="30" rx="9" fill="#2c3029"/><text x="210" y="126" text-anchor="middle" class="muted">Alternative rock</text>
      <rect x="286" y="106" width="130" height="30" rx="9" fill="#2c3029"/><text x="351" y="126" text-anchor="middle" class="muted">No references</text>
    </g>

    <!-- Emotion and structure timeline -->
    <g transform="translate(242 328)">
      <rect width="878" height="200" rx="18" fill="#20221e" stroke="#3b3e36"/>
      <text x="22" y="30" class="section">EMOTION ACROSS THE STRUCTURE</text>
      <circle cx="500" cy="26" r="5" fill="#6687bd"/><text x="512" y="30" class="muted">Melancholy</text>
      <circle cx="606" cy="26" r="5" fill="#d46f80"/><text x="618" y="30" class="muted">Longing</text>
      <circle cx="694" cy="26" r="5" fill="#c68b50"/><text x="706" y="30" class="muted">Despair</text>
      <text x="850" y="30" text-anchor="end" class="muted">EDIT ARC</text>
      <g transform="translate(28 52)">
        <g stroke="#34372f"><line x1="0" y1="28" x2="822" y2="28"/><line x1="0" y1="66" x2="822" y2="66"/><line x1="0" y1="104" x2="822" y2="104"/></g>
        <path d="M0 89 L112 74 L270 65 L388 53 L548 45 L680 34 L822 38" fill="none" stroke="#6687bd" stroke-width="3"/>
        <path d="M0 103 L112 91 L270 60 L388 37 L548 35 L680 29 L822 31" fill="none" stroke="#d46f80" stroke-width="3"/>
        <path d="M0 111 L112 106 L270 99 L388 90 L548 74 L680 52 L822 21" fill="none" stroke="#c68b50" stroke-width="3"/>
        <g fill="#20221e" stroke-width="3">
          <g stroke="#6687bd"><circle cx="0" cy="89" r="4"/><circle cx="112" cy="74" r="4"/><circle cx="270" cy="65" r="4"/><circle cx="388" cy="53" r="4"/><circle cx="548" cy="45" r="4"/><circle cx="680" cy="34" r="4"/><circle cx="822" cy="38" r="4"/></g>
          <g stroke="#d46f80"><circle cx="0" cy="103" r="4"/><circle cx="112" cy="91" r="4"/><circle cx="270" cy="60" r="4"/><circle cx="388" cy="37" r="4"/><circle cx="548" cy="35" r="4"/><circle cx="680" cy="29" r="4"/><circle cx="822" cy="31" r="4"/></g>
          <g stroke="#c68b50"><circle cx="0" cy="111" r="4"/><circle cx="112" cy="106" r="4"/><circle cx="270" cy="99" r="4"/><circle cx="388" cy="90" r="4"/><circle cx="548" cy="74" r="4"/><circle cx="680" cy="52" r="4"/><circle cx="822" cy="21" r="4"/></g>
        </g>
        <g transform="translate(0 124)">
          <rect width="90" height="32" rx="7" fill="#3b3c35"/><text x="45" y="21" text-anchor="middle" class="muted" fill="#d6d7d0">Intro</text>
          <rect x="94" width="136" height="32" rx="7" fill="#384252"/><text x="162" y="21" text-anchor="middle" class="muted" fill="#d6d7d0">Verse 1</text>
          <rect x="234" width="104" height="32" rx="7" fill="#4a3f35"/><text x="286" y="21" text-anchor="middle" class="muted" fill="#d6d7d0">Pre</text>
          <rect x="342" width="140" height="32" rx="7" fill="#5a3941"/><text x="412" y="21" text-anchor="middle" class="muted" fill="#d6d7d0">Chorus</text>
          <rect x="486" width="112" height="32" rx="7" fill="#384252"/><text x="542" y="21" text-anchor="middle" class="muted" fill="#d6d7d0">Verse 2</text>
          <rect x="602" width="96" height="32" rx="7" fill="#4b4057" stroke="#8274ae"/><text x="650" y="21" text-anchor="middle" class="muted" fill="#d6d7d0">Bridge</text>
          <rect x="702" width="120" height="32" rx="7" fill="#5a3941"/><text x="762" y="21" text-anchor="middle" class="muted" fill="#d6d7d0">Final chorus</text>
        </g>
      </g>
    </g>

    <!-- Structure coverage -->
    <g transform="translate(242 544)">
      <rect width="424" height="194" rx="18" fill="#20221e" stroke="#3b3e36"/>
      <text x="22" y="30" class="section">STRUCTURE COVERAGE</text>
      <text x="400" y="30" text-anchor="end" class="muted">4 OF 44 BARS</text>
      <g transform="translate(22 52)">
        <text y="13" class="body">Intro</text><text x="378" y="13" text-anchor="end" class="muted">0 / 4 bars</text><rect x="88" y="5" width="220" height="7" rx="4" fill="#3a3d35"/>
        <text y="43" class="body">Verse 1</text><text x="378" y="43" text-anchor="end" class="muted">4 / 8 bars</text><rect x="88" y="35" width="220" height="7" rx="4" fill="#3a3d35"/><rect x="88" y="35" width="110" height="7" rx="4" fill="#6687bd"/>
        <text y="73" class="body">Pre</text><text x="378" y="73" text-anchor="end" class="muted">0 / 4 bars</text><rect x="88" y="65" width="220" height="7" rx="4" fill="#3a3d35"/>
        <text y="103" class="body">Chorus</text><text x="378" y="103" text-anchor="end" class="muted">0 / 8 bars</text><rect x="88" y="95" width="220" height="7" rx="4" fill="#3a3d35"/>
        <text y="133" class="body">Bridge</text><text x="378" y="133" text-anchor="end" class="muted">0 / 4 bars</text><rect x="88" y="125" width="220" height="7" rx="4" fill="#3a3d35"/>
      </g>
    </g>

    <!-- Harmony and rhythm -->
    <g transform="translate(682 544)">
      <rect width="438" height="194" rx="18" fill="#20221e" stroke="#3b3e36"/>
      <text x="22" y="30" class="section">HARMONY &amp; RHYTHM</text>
      <text x="416" y="30" text-anchor="end" class="muted">SELECTED · PHRASE 02</text>
      <g transform="translate(22 48)">
        <rect width="58" height="38" rx="9" fill="#2e302a"/><text x="29" y="24" text-anchor="middle" class="body">Dm</text>
        <path d="M64 19 H78" stroke="#72776c"/><rect x="84" width="58" height="38" rx="9" fill="#2e302a"/><text x="113" y="24" text-anchor="middle" class="body">Bb</text>
        <path d="M148 19 H162" stroke="#72776c"/><rect x="168" width="58" height="38" rx="9" fill="#3d3025" stroke="#8e6a43"/><text x="197" y="24" text-anchor="middle" class="body">A7</text>
        <text x="372" y="24" text-anchor="end" class="muted">home · color · pull</text>
        <text x="0" y="68" class="muted">TENSION PATH</text>
        <path d="M0 112 C70 112 116 96 186 88 S306 54 372 48" fill="none" stroke="#d8a45e" stroke-width="3" stroke-linecap="round"/>
        <line x1="0" y1="120" x2="372" y2="120" stroke="#3b3e36"/>
        <circle cx="0" cy="112" r="4" fill="#f4efe5"/><circle cx="186" cy="88" r="4" fill="#f4efe5"/><circle cx="372" cy="48" r="5" fill="#d8a45e"/>
        <text x="0" y="140" class="muted">slow pulse · growing</text>
        <text x="372" y="140" text-anchor="end" class="muted">final tension 88%</text>
      </g>
    </g>

    <!-- Current phrase -->
    <g transform="translate(242 754)" filter="url(#shadow)">
      <rect width="878" height="176" rx="18" fill="#f4efe5"/>
      <rect width="7" height="176" rx="4" fill="#d46f80"/>
      <text x="24" y="30" class="paper-label">SELECTED PHRASE · VERSE 1 · PHRASE 02</text>
      <text x="850" y="30" text-anchor="end" class="paper-label">LONGING 64% · 2 BARS</text>
      <line x1="24" y1="45" x2="850" y2="45" stroke="#d9d1c3"/>
      <text x="46" y="75" class="chord">Dm</text><text x="318" y="75" class="chord">Bb</text><text x="684" y="75" class="chord">A7</text>
      <text x="46" y="107" class="serif lyric">I still set the table like you might come home</text>
      <text x="46" y="138" class="paper-muted">Soft piano · slow pulse · growing · ends with harmonic pull</text>
      <rect x="700" y="120" width="68" height="36" rx="9" fill="#e5dccd"/><text x="734" y="143" text-anchor="middle" class="btn" fill="#50534b">Loop</text>
      <rect x="778" y="120" width="72" height="36" rx="9" fill="#302a20"/><text x="814" y="143" text-anchor="middle" class="btn" fill="#f4efe5">▶ Play</text>
    </g>

    <!-- Context and readiness panel -->
    <rect x="1154" y="64" width="286" height="896" fill="#20221e"/>
    <text x="1182" y="106" class="section">COMPOSITION STATUS</text>
    <text x="1182" y="140" class="title">Ready to keep writing</text>
    <line x1="1182" y1="158" x2="1412" y2="158" stroke="#34372f"/>

    <g transform="translate(1182 184)">
      <text x="0" y="12" class="muted">Phrases drafted</text><text x="230" y="12" text-anchor="end" class="body">17 / 23</text>
      <rect y="28" width="230" height="8" rx="4" fill="#373a33"/><rect y="28" width="170" height="8" rx="4" fill="url(#progress)"/>
      <text x="0" y="68" class="muted">Sections playable</text><text x="230" y="68" text-anchor="end" class="body">5 / 7</text>
      <rect y="84" width="230" height="8" rx="4" fill="#373a33"/><rect y="84" width="164" height="8" rx="4" fill="#6687bd"/>
    </g>

    <text x="1182" y="314" class="section">OPEN DECISIONS · 3</text>
    <g transform="translate(1182 332)">
      <rect width="230" height="66" rx="12" fill="#292b26" stroke="#3c4037"/>
      <circle cx="18" cy="20" r="5" fill="#8274ae"/><text x="32" y="24" class="body">Finish Bridge phrases</text><text x="32" y="47" class="muted">2 phrases still empty</text>
      <rect y="76" width="230" height="66" rx="12" fill="#292b26" stroke="#3c4037"/>
      <circle cx="18" cy="96" r="5" fill="#c68b50"/><text x="32" y="100" class="body">Resolve final A7?</text><text x="32" y="123" class="muted">Ending remains open</text>
      <rect y="152" width="230" height="66" rx="12" fill="#292b26" stroke="#3c4037"/>
      <circle cx="18" cy="172" r="5" fill="#55a3a3"/><text x="32" y="176" class="body">Choose chorus rhythm</text><text x="32" y="199" class="muted">Verse groove is inherited</text>
    </g>

    <text x="1182" y="584" class="section">ARRANGEMENT SEEDS</text>
    <g transform="translate(1182 602)">
      <rect width="230" height="42" rx="10" fill="#292b26"/><circle cx="18" cy="21" r="5" fill="#d8a45e"/><text x="32" y="26" class="body">Harmony · Soft piano</text>
      <rect y="50" width="230" height="42" rx="10" fill="#292b26"/><circle cx="18" cy="71" r="5" fill="#6687bd"/><text x="32" y="76" class="body">Bass · Upright</text>
      <rect y="100" width="230" height="42" rx="10" fill="#292b26"/><circle cx="18" cy="121" r="5" fill="#55a3a3"/><text x="32" y="126" class="body">Rhythm · Brushes</text>
    </g>

    <text x="1182" y="784" class="section">NEXT BEST STEP</text>
    <rect x="1182" y="802" width="230" height="80" rx="14" fill="#333027" stroke="#6d5737"/>
    <text x="1198" y="830" class="body">Write Bridge · Phrase 02</text>
    <text x="1198" y="853" class="muted">Carry despair toward the final</text>
    <text x="1198" y="872" class="muted">chorus without resolving yet.</text>
    <rect x="1182" y="894" width="230" height="40" rx="10" fill="#d8a45e"/>
    <text x="1297" y="919" text-anchor="middle" class="btn" fill="#211a10">Open next phrase →</text>

    <!-- Persistent transport -->
    <rect x="0" y="960" width="1440" height="64" fill="#20221e"/>
    <text x="28" y="998" class="muted">Song preview</text>
    <rect x="592" y="974" width="36" height="36" rx="18" fill="#2d3029"/><text x="610" y="998" text-anchor="middle" font-size="15" fill="#d6d7d0">■</text>
    <rect x="640" y="974" width="36" height="36" rx="18" fill="#d8a45e"/><text x="658" y="998" text-anchor="middle" font-size="15" fill="#211a10">▶</text>
    <text x="708" y="997" class="body">92 BPM</text><text x="784" y="997" class="muted">4/4</text><text x="840" y="997" class="muted">D minor</text>
    <line x1="940" y1="992" x2="1240" y2="992" stroke="#43473e" stroke-width="5" stroke-linecap="round"/>
    <line x1="940" y1="992" x2="1114" y2="992" stroke="#d8a45e" stroke-width="5" stroke-linecap="round"/>
    <circle cx="1114" cy="992" r="6" fill="#d8a45e"/>
    <text x="1388" y="997" text-anchor="end" class="muted">Verse 1 · Phrase 02 · bar 3</text>
  </g>
</svg>
