      <circle cx="22" cy="54" r="7" fill="#dca65c"/>
      <text x="40" y="58" font-size="12" font-weight="750" fill="#f4f1e9">Long Road</text>
      <text x="316" y="58" text-anchor="end" class="body">&#x21B6;  &#x21B7;</text>
      <g transform="translate(14 92)">
        <rect width="312" height="38" rx="12" fill="#1b1d19"/>
        <text x="52" y="24" text-anchor="middle" class="nav active">Story</text>
        <text x="156" y="24" text-anchor="middle" class="nav">Frame</text>
        <text x="260" y="24" text-anchor="middle" class="nav">Emotions</text>
      </g>
      <text x="16" y="158" class="small">STORY WORKSPACE</text>
      <text x="16" y="184" class="screen-title">Write the song first.</text>
      <rect x="16" y="204" width="308" height="386" rx="18" fill="#f4efe5"/>
      <text x="34" y="234" class="small" fill="#73776d">WORKING PREMISE</text>
      <text x="34" y="270" class="paper-title">The Long Road Within</text>
