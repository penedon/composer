<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100" role="img" aria-labelledby="title desc">
  <title id="title">Composer mobile core flow screen drafts</title>
  <desc id="desc">Four compact phone screen drafts for Story, Emotions, Structure, and Phrase Workspace.</desc>
  <defs>
    <style>.ui{font-family:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.h1{font-size:34px;font-weight:650;fill:#f4f1e9}.screen-title{font-size:19px;font-weight:750;fill:#f4f1e9}.body{font-size:11px;fill:#b8bbb1}.small{font-size:8px;font-weight:800;letter-spacing:.09em;fill:#8f9489}.paper-title{font-size:19px;font-weight:700;fill:#292b25}.paper{font-size:12px;fill:#44473f}.nav{font-size:8px;font-weight:750;fill:#b8bbb1}.active{fill:#dca65c}</style>
  </defs>
  <rect width="1600" height="1100" fill="#171916"/>
  <g class="ui">
    <text x="60" y="58" class="small">COMPOSER &#xB7; COMPACT SCREEN DRAFTS</text>
    <text x="60" y="100" class="h1">Intent to first phrase</text>
    <text x="1540" y="90" text-anchor="end" class="body">390 &#xD7; 844 reference viewport</text>
    <g transform="translate(60 152)">
