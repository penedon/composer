      <text x="73" y="326" text-anchor="middle" font-size="8" font-weight="800" fill="#73776d">PREMISE</text>
      <text x="34" y="358" class="paper">A traveler returns home, unsure</text>
      <text x="34" y="378" class="paper">whether the road changed him.</text>
      <line x1="34" y1="404" x2="306" y2="404" stroke="#ddd4c5"/>
      <rect x="34" y="424" width="74" height="24" rx="12" fill="#e5dccd"/>
      <text x="71" y="440" text-anchor="middle" font-size="8" font-weight="800" fill="#73776d">CONFLICT</text>
