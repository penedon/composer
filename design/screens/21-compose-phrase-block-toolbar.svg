<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">Cleaner Composer phrase block controls proposal</title>
  <desc id="desc">A focused design proposal for the Compose phrase block. The selected phrase uses a compact icon toolbar with tooltips for lead-in, loop, alternative, and chord possibilities; Play remains visually primary; infrequent structural actions move into a more-actions menu.</desc>
  <defs>
    <filter id="card-shadow" x="-15%" y="-25%" width="130%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="24" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <filter id="floating-shadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .ui { font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .serif { font-family: Georgia, "Times New Roman", serif; }
      .eyebrow { font-size: 10px; font-weight: 800; letter-spacing: .09em; fill: #8f9489; }
      .title { font-size: 25px; font-weight: 650; fill: #f4f1e9; }
      .body { font-size: 13px; fill: #b8bbb1; }
      .muted { font-size: 11px; fill: #8f9489; }
      .paper-label { font-size: 10px; font-weight: 800; letter-spacing: .08em; fill: #73776d; }
      .lyric { font-size: 27px; fill: #292b25; }
      .chord { font-size: 14px; font-weight: 800; fill: #74562f; }
      .button { font-size: 12px; font-weight: 800; }
      .tooltip { font-size: 11px; font-weight: 700; fill: #f4f1e9; }
      .menu { font-size: 12px; fill: #d6d7d0; }
      .note-title { font-size: 12px; font-weight: 750; fill: #f4f1e9; }
      .note-copy { font-size: 11px; fill: #9da197; }
      .icon-stroke { fill: none; stroke: currentColor; stroke-linecap: round; stroke-linejoin: round; stroke-width: 1.7; }
    </style>
  </defs>

  <rect width="1440" height="900" fill="#171916"/>
  <g class="ui">
    <text x="72" y="62" class="eyebrow">COMPOSER · PHRASE BLOCK REVIEW</text>
    <text x="72" y="101" class="title">Keep the words primary. Reveal tools when they are useful.</text>
    <text x="72" y="130" class="body">Proposed selected state · compact actions, descriptive tooltips, and one home for structural edits.</text>

    <!-- Workspace context -->
    <rect x="72" y="168" width="1296" height="656" rx="24" fill="#20221e" stroke="#34372f"/>
    <text x="106" y="207" class="eyebrow">PHRASE WORKSPACE · VERSE 1</text>
    <text x="106" y="238" font-size="19" font-weight="650" fill="#f4f1e9">Write in playable thoughts.</text>
    <g transform="translate(106 261)">
      <rect width="82" height="26" rx="13" fill="#2b2e28" stroke="#4a4f44"/><circle cx="14" cy="13" r="4" fill="#45546b"/><text x="25" y="17" font-size="10" fill="#d6d7d0">Verse 1</text>
      <rect x="90" width="68" height="26" rx="13" fill="transparent" stroke="#34372f"/><text x="124" y="17" text-anchor="middle" font-size="10" fill="#8f9489">D minor</text>
      <rect x="166" width="58" height="26" rx="13" fill="transparent" stroke="#34372f"/><text x="195" y="17" text-anchor="middle" font-size="10" fill="#8f9489">92 BPM</text>
    </g>

    <!-- Selected phrase -->
    <g transform="translate(106 315)" filter="url(#card-shadow)">
      <rect width="920" height="378" rx="20" fill="#f4efe5"/>
      <path d="M0 20 Q0 0 20 0 H7 V378 H20 Q0 378 0 358 Z" fill="#6687bd"/>

      <text x="26" y="32" class="paper-label">PHRASE 02 · 2 BARS</text>
      <circle cx="792" cy="27" r="4" fill="#d46f80"/>
      <text x="804" y="31" class="paper-label">LONGING</text>

      <!-- Chord lane remains contextual and uncluttered -->
      <g transform="translate(26 56)">
        <line x1="0" y1="48" x2="868" y2="48" stroke="#ded6c8"/>
        <g transform="translate(0 0)"><rect width="72" height="38" rx="9" fill="#eee2cf" stroke="#d2a76a"/><text x="36" y="24" text-anchor="middle" class="chord">Dm</text></g>
        <g transform="translate(294 0)" filter="url(#floating-shadow)"><rect width="72" height="38" rx="9" fill="#302a20" stroke="#dca65c" stroke-width="2"/><text x="36" y="24" text-anchor="middle" font-size="14" font-weight="800" fill="#fffaf0">Bb</text></g>
        <g transform="translate(650 0)"><rect width="72" height="38" rx="9" fill="#eee2cf" stroke="#d2a76a"/><text x="36" y="24" text-anchor="middle" class="chord">A7</text></g>
      </g>

      <text x="30" y="158" class="serif lyric">I still set the table like you might come home</text>
      <line x1="26" y1="183" x2="894" y2="183" stroke="#d8d0c3"/>
      <text x="30" y="208" class="muted" fill="#73776d">Soft piano · slow pulse · growing</text>

      <!-- Cleaner action row -->
      <line x1="26" y1="236" x2="894" y2="236" stroke="#ded6c8"/>
      <g transform="translate(26 256)">
        <!-- Primary play remains explicit -->
        <rect width="42" height="42" rx="10" fill="#302a20"/>
        <path d="M16 13 L16 29 L30 21 Z" fill="#f4efe5"/>

        <!-- Lead in -->
        <g transform="translate(54 0)" color="#50534b">
          <rect width="42" height="42" rx="10" fill="#e7dfd2"/>
          <path d="M27 13 H20 A8 8 0 0 0 12 21 A8 8 0 0 0 20 29 H29 M12 21 L17 16 M12 21 L17 26" class="icon-stroke"/>
        </g>
        <!-- Loop -->
        <g transform="translate(104 0)" color="#50534b">
          <rect width="42" height="42" rx="10" fill="#e7dfd2"/>
          <path d="M12 18 C13 14 16 12 20 12 H27 L24 9 M30 24 C29 28 26 30 22 30 H15 L18 33 M27 12 L27 17 M15 30 L15 25" class="icon-stroke"/>
        </g>
        <!-- Alternative -->
        <g transform="translate(154 0)" color="#50534b">
          <rect width="42" height="42" rx="10" fill="#e7dfd2"/>
          <rect x="11" y="13" width="15" height="17" rx="2" class="icon-stroke"/>
          <path d="M16 9 H29 A2 2 0 0 1 31 11 V26" class="icon-stroke"/>
        </g>
        <!-- Chord possibilities: hover state -->
        <g transform="translate(204 0)" color="#76582f">
          <rect width="42" height="42" rx="10" fill="#eee2cf" stroke="#d2a76a"/>
          <path d="M14 14 V28 M14 18 H20 V14 M20 14 V28 M24 12 V30 M24 17 H30 V13 M30 13 V27" class="icon-stroke"/>
          <circle cx="31" cy="10" r="2" fill="#dca65c"/>
        </g>
        <line x1="258" y1="5" x2="258" y2="37" stroke="#d4ccbf"/>
        <!-- More structural actions -->
        <g transform="translate(270 0)" color="#50534b">
          <rect width="42" height="42" rx="10" fill="#e7dfd2"/>
          <circle cx="13" cy="21" r="1.8" fill="currentColor"/><circle cx="21" cy="21" r="1.8" fill="currentColor"/><circle cx="29" cy="21" r="1.8" fill="currentColor"/>
        </g>

        <text x="868" y="26" text-anchor="end" class="paper-label">SHIFT + ENTER · PLAY &amp; NEXT</text>

        <!-- Visible tooltip demonstrates the interaction pattern -->
        <g transform="translate(162 -48)" filter="url(#floating-shadow)">
          <rect width="126" height="32" rx="7" fill="#20221e"/>
          <path d="M59 32 L67 32 L63 38 Z" fill="#20221e"/>
          <text x="63" y="21" text-anchor="middle" class="tooltip">Chord possibilities</text>
        </g>
      </g>

      <!-- Non-modal more menu shown for review -->
      <g transform="translate(296 306)" filter="url(#floating-shadow)">
        <rect width="190" height="178" rx="12" fill="#20221e" stroke="#4a4f44"/>
        <text x="16" y="23" class="eyebrow">PHRASE ACTIONS</text>
        <g transform="translate(12 34)">
          <rect width="166" height="28" rx="7" fill="#2b2e28"/><text x="14" y="19" class="menu">↑  Move earlier</text>
          <text x="14" y="48" class="menu">↓  Move later</text>
          <text x="14" y="76" class="menu">⑂  Split phrase</text>
          <text x="14" y="104" class="menu">⇥  Merge with next</text>
          <line x1="0" y1="119" x2="166" y2="119" stroke="#34372f"/>
          <text x="14" y="145" font-size="12" fill="#e6a09b">⌫  Remove phrase</text>
        </g>
      </g>
    </g>

    <!-- Review notes -->
    <g transform="translate(1060 318)">
      <text x="0" y="0" class="eyebrow">CONTROL HIERARCHY</text>

      <circle cx="8" cy="36" r="8" fill="#dca65c"/><text x="28" y="40" class="note-title">1 · Distinguish Play visually</text>
      <text x="28" y="60" class="note-copy">The dark Play icon remains primary;</text>
      <text x="28" y="77" class="note-copy">its label appears on hover or focus.</text>

      <circle cx="8" cy="116" r="8" fill="#6687bd"/><text x="28" y="120" class="note-title">2 · Compact frequent tools</text>
      <text x="28" y="140" class="note-copy">Lead-in, Loop, Alternative, and Chord</text>
      <text x="28" y="157" class="note-copy">possibilities use 42px icon targets.</text>

      <circle cx="8" cy="196" r="8" fill="#8274ae"/><text x="28" y="200" class="note-title">3 · Describe on hover/focus</text>
      <text x="28" y="220" class="note-copy">Tooltips appear for mouse and keyboard;</text>
      <text x="28" y="237" class="note-copy">aria-labels preserve screen-reader clarity.</text>

      <circle cx="8" cy="276" r="8" fill="#c68b50"/><text x="28" y="280" class="note-title">4 · Tuck away structure edits</text>
      <text x="28" y="300" class="note-copy">Move, Split, Merge, and Remove are lower</text>
      <text x="28" y="317" class="note-copy">frequency and belong in one menu.</text>

      <rect x="0" y="356" width="250" height="94" rx="14" fill="#292b26" stroke="#3c4037"/>
      <text x="18" y="382" class="eyebrow">INACTIVE PHRASES</text>
      <text x="18" y="406" class="note-copy">Show only the Play icon and a subtle</text>
      <text x="18" y="423" class="note-copy">more button until the phrase is selected.</text>
    </g>
  </g>
</svg>
