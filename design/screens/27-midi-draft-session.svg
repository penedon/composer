<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1024" viewBox="0 0 1440 1024" role="img" aria-labelledby="title desc">
  <title id="title">Composer Arrange Draft Session with MIDI recording</title>
  <desc id="desc">A Studio Notebook desktop screen showing the Drafts tab in Arrange, a connected MIDI keyboard, recording controls, draft take cards grouped by instrument track, a selected piano take with a two-bar range, and a placement inspector targeting Verse 1.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="7" stdDeviation="12" flood-color="#000000" flood-opacity=".18"/></filter>
    <style>
      .ui { font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .brand { font-size: 22px; font-weight: 700; fill: #f4f1e9; }
      .title { font-size: 25px; font-weight: 650; fill: #f4f1e9; }
      .eyebrow { font-size: 10px; font-weight: 800; letter-spacing: .09em; fill: #8f9489; }
      .body { font-size: 13px; fill: #b8bbb1; }
      .label { font-size: 12px; font-weight: 700; fill: #d6d7d0; }
      .muted { font-size: 11px; fill: #8f9489; }
      .tiny { font-size: 9px; fill: #777c72; }
      .nav { font-size: 13px; font-weight: 650; fill: #b8bbb1; }
      .button { font-size: 11px; font-weight: 750; }
      .paper-label { font-size: 11px; font-weight: 700; fill: #3d4038; }
      .paper-muted { font-size: 10px; fill: #73776d; }
      .inspector-title { font-size: 17px; font-weight: 650; fill: #f4f1e9; }
      .value { font-size: 12px; fill: #d6d7d0; }
    </style>
  </defs>

  <rect width="1440" height="1024" fill="#171916"/>
  <g class="ui">
    <!-- Project bar -->
    <rect width="1440" height="64" fill="#20221e"/>
    <circle cx="24" cy="32" r="9" fill="#dca65c"/><text x="42" y="39" class="brand">Composer</text>
    <line x1="192" y1="18" x2="192" y2="46" stroke="#34372f"/>
    <text x="212" y="27" class="eyebrow">PROJECT</text><text x="212" y="45" class="label">The Doorway</text>
    <text x="1158" y="38" class="muted">↶ Undo</text><text x="1240" y="38" class="muted">↷ Redo</text>
    <circle cx="1345" cy="32" r="4" fill="#79936a"/><text x="1356" y="36" class="muted">Saved</text>

    <!-- Rail -->
    <rect x="0" y="64" width="208" height="896" fill="#1b1d19"/>
    <text x="24" y="98" class="eyebrow">CREATE</text>
    <g transform="translate(12 116)"><circle cx="22" cy="22" r="11" fill="#2b2e28"/><text x="22" y="26" text-anchor="middle" class="muted">1</text><text x="48" y="27" class="nav">Story</text></g>
    <g transform="translate(12 166)"><circle cx="22" cy="22" r="11" fill="#2b2e28"/><text x="22" y="26" text-anchor="middle" class="muted">2</text><text x="48" y="27" class="nav">Frame</text></g>
    <g transform="translate(12 216)"><circle cx="22" cy="22" r="11" fill="#2b2e28"/><text x="22" y="26" text-anchor="middle" class="muted">3</text><text x="48" y="27" class="nav">Emotions</text></g>
    <g transform="translate(12 266)"><circle cx="22" cy="22" r="11" fill="#2b2e28"/><text x="22" y="26" text-anchor="middle" class="muted">4</text><text x="48" y="27" class="nav">Structure</text></g>
    <g transform="translate(12 316)"><circle cx="22" cy="22" r="11" fill="#2b2e28"/><text x="22" y="26" text-anchor="middle" class="muted">5</text><text x="48" y="27" class="nav">Compose</text></g>
    <g transform="translate(12 366)"><rect width="184" height="44" rx="10" fill="#4b4332"/><circle cx="22" cy="22" r="11" fill="#dca65c"/><text x="22" y="26" text-anchor="middle" font-size="11" font-weight="800" fill="#211a10">6</text><text x="48" y="27" class="nav" fill="#f4f1e9">Arrange</text></g>
    <g transform="translate(12 416)"><circle cx="22" cy="22" r="11" fill="#2b2e28"/><text x="22" y="26" text-anchor="middle" class="muted">7</text><text x="48" y="27" class="nav">Export</text></g>

    <g transform="translate(20 748)">
      <rect width="168" height="180" rx="14" fill="#20221e" stroke="#34372f"/>
      <text x="16" y="28" class="eyebrow">MIDI INPUT</text>
      <circle cx="18" cy="52" r="5" fill="#79936a"/><text x="30" y="56" class="label">Connected</text>
      <text x="16" y="82" class="muted">KeyLab Essential 49</text>
      <text x="16" y="104" class="muted">All channels</text>
      <line x1="16" y1="120" x2="152" y2="120" stroke="#34372f"/>
      <text x="16" y="145" class="eyebrow">LAST INPUT</text>
      <text x="16" y="166" class="label">C4 · velocity 91</text>
    </g>

    <!-- Main canvas -->
    <rect x="208" y="64" width="946" height="896" fill="#171916"/>
    <g transform="translate(240 88)">
      <text x="0" y="10" class="eyebrow">ARRANGE · DRAFT SESSION</text>
      <text x="0" y="45" class="title">Catch the idea before deciding where it belongs.</text>
      <text x="0" y="72" class="body">Record a MIDI take, keep the raw performance, then place all or part of it into a song section.</text>
      <g transform="translate(694 4)">
        <rect width="188" height="38" rx="11" fill="#20221e" stroke="#3b3e36"/>
        <rect x="4" y="4" width="88" height="30" rx="8" fill="#252722"/><text x="48" y="24" text-anchor="middle" class="muted">Song</text>
        <rect x="96" y="4" width="88" height="30" rx="8" fill="#4b4031" stroke="#dca65c"/><text x="140" y="24" text-anchor="middle" class="label">Drafts</text>
      </g>
    </g>

    <!-- Connection and record strip -->
    <g transform="translate(240 178)" filter="url(#shadow)">
      <rect width="882" height="92" rx="14" fill="#20221e" stroke="#34372f"/>
      <g transform="translate(16 14)">
        <text x="0" y="10" class="eyebrow">INPUT</text>
        <rect y="19" width="184" height="40" rx="9" fill="#2b2e28" stroke="#4a4f44"/>
        <circle cx="16" cy="39" r="4" fill="#79936a"/><text x="29" y="43" class="label">KeyLab Essential 49</text><text x="169" y="43" text-anchor="end" class="muted">⌄</text>
      </g>
      <g transform="translate(214 14)">
        <text x="0" y="10" class="eyebrow">PLAYS</text>
        <rect y="19" width="154" height="40" rx="9" fill="#2b2e28" stroke="#4a4f44"/>
        <text x="12" y="43" class="label">Melody · Voice</text><text x="139" y="43" text-anchor="end" class="muted">⌄</text>
      </g>
      <g transform="translate(382 14)"><text x="0" y="10" class="eyebrow">COUNT-IN</text><rect y="19" width="78" height="40" rx="9" fill="#2b2e28"/><text x="39" y="43" text-anchor="middle" class="label">1 bar</text></g>
      <g transform="translate(470 14)"><text x="0" y="10" class="eyebrow">LENGTH</text><rect y="19" width="74" height="40" rx="9" fill="#2b2e28"/><text x="37" y="43" text-anchor="middle" class="label">4 bars</text></g>
      <g transform="translate(554 14)"><text x="0" y="10" class="eyebrow">MONITOR</text><rect y="19" width="68" height="40" rx="9" fill="#33443b" stroke="#79936a"/><text x="34" y="43" text-anchor="middle" class="label">On</text></g>
      <g transform="translate(636 10)">
        <rect width="230" height="58" rx="12" fill="#d46f80"/>
        <circle cx="27" cy="29" r="8" fill="#f4f1e9"/>
        <text x="49" y="25" class="button" fill="#2c171b">RECORD NEW TAKE</text>
        <text x="49" y="42" font-size="10" fill="#54252d">Space · Voice · 4 bars</text>
      </g>
    </g>

    <!-- Take library -->
    <g transform="translate(240 290)">
      <text x="0" y="12" class="eyebrow">DRAFT TAKES</text>
      <text x="882" y="12" text-anchor="end" class="muted">6 takes · grouped by instrument track</text>
      <g transform="translate(0 28)">
        <rect width="882" height="190" rx="14" fill="#20221e" stroke="#34372f"/>
        <g transform="translate(14 14)">
          <rect width="150" height="72" rx="10" fill="#2b2e28"/>
          <circle cx="20" cy="22" r="12" fill="#3a3d35"/><text x="20" y="26" text-anchor="middle" class="label">M</text>
          <text x="40" y="21" class="label">Melody · Voice</text><text x="40" y="40" class="muted">3 takes</text>
          <text x="14" y="61" class="tiny">ARMED · D MINOR</text>
        </g>
        <!-- selected take -->
        <g transform="translate(178 14)">
          <rect width="214" height="72" rx="10" fill="#f4efe5" stroke="#dca65c" stroke-width="2"/>
          <text x="12" y="18" class="paper-label">Take 03 · doorway motif</text><text x="202" y="18" text-anchor="end" class="paper-muted">4 bars</text>
          <g fill="#c68b50"><rect x="13" y="48" width="28" height="5" rx="2.5"/><rect x="47" y="37" width="20" height="5" rx="2.5"/><rect x="73" y="42" width="38" height="5" rx="2.5"/><rect x="118" y="29" width="29" height="5" rx="2.5"/><rect x="154" y="38" width="46" height="5" rx="2.5"/></g>
          <text x="12" y="66" class="paper-muted">18 notes · just now</text>
        </g>
        <g transform="translate(402 14)">
          <rect width="214" height="72" rx="10" fill="#2b2e28" stroke="#4a4f44"/>
          <text x="12" y="18" class="label">Take 02 · falling answer</text><text x="202" y="18" text-anchor="end" class="muted">2 bars</text>
          <g fill="#6687bd"><rect x="13" y="32" width="36" height="5" rx="2.5"/><rect x="56" y="40" width="28" height="5" rx="2.5"/><rect x="91" y="48" width="45" height="5" rx="2.5"/><rect x="143" y="42" width="56" height="5" rx="2.5"/></g>
          <text x="12" y="66" class="tiny">11 notes · 8 min ago</text>
        </g>
        <g transform="translate(626 14)">
          <rect width="242" height="72" rx="10" fill="#2b2e28" stroke="#4a4f44"/>
          <text x="12" y="18" class="label">Take 01 · held tone</text><text x="230" y="18" text-anchor="end" class="muted">4 bars</text>
          <g fill="#6687bd"><rect x="13" y="37" width="93" height="5" rx="2.5"/><rect x="113" y="31" width="54" height="5" rx="2.5"/><rect x="174" y="42" width="56" height="5" rx="2.5"/></g>
          <text x="12" y="66" class="tiny">6 notes · 11 min ago</text>
        </g>

        <line x1="14" y1="99" x2="868" y2="99" stroke="#34372f"/>
        <g transform="translate(14 108)">
          <rect width="150" height="68" rx="10" fill="#2b2e28"/>
          <circle cx="20" cy="22" r="12" fill="#3a3d35"/><text x="20" y="26" text-anchor="middle" class="label">R</text>
          <text x="40" y="21" class="label">Rhythm · Brush kit</text><text x="40" y="40" class="muted">2 takes</text>
          <text x="14" y="59" class="tiny">NOT ARMED</text>
        </g>
        <g transform="translate(178 108)">
          <rect width="214" height="68" rx="10" fill="#2b2e28" stroke="#4a4f44"/>
          <text x="12" y="18" class="label">Take 02 · half-time</text><text x="202" y="18" text-anchor="end" class="muted">4 bars</text>
          <g fill="#dca65c"><circle cx="15" cy="43" r="4"/><circle cx="39" cy="34" r="3"/><circle cx="65" cy="43" r="4"/><circle cx="91" cy="34" r="3"/><circle cx="117" cy="43" r="4"/><circle cx="143" cy="34" r="3"/><circle cx="169" cy="43" r="4"/><circle cx="195" cy="34" r="3"/></g>
          <text x="12" y="61" class="tiny">26 hits</text>
        </g>
        <g transform="translate(402 108)"><rect width="214" height="68" rx="10" fill="#2b2e28" stroke="#4a4f44"/><text x="12" y="18" class="label">Take 01 · brushed pulse</text><text x="202" y="18" text-anchor="end" class="muted">2 bars</text><g fill="#dca65c"><circle cx="15" cy="42" r="3"/><circle cx="45" cy="34" r="3"/><circle cx="75" cy="42" r="3"/><circle cx="105" cy="34" r="3"/><circle cx="135" cy="42" r="3"/><circle cx="165" cy="34" r="3"/><circle cx="195" cy="42" r="3"/></g><text x="12" y="61" class="tiny">18 hits</text></g>
        <g transform="translate(626 108)"><rect width="242" height="68" rx="10" fill="#252722" stroke="#3a3d35" stroke-dasharray="6 5"/><text x="121" y="30" text-anchor="middle" class="label">＋ Record rhythm take</text><text x="121" y="49" text-anchor="middle" class="tiny">Arm Brush kit first</text></g>
      </g>
    </g>

    <!-- Take editor -->
    <g transform="translate(240 532)" filter="url(#shadow)">
      <rect width="882" height="378" rx="14" fill="#f4efe5"/>
      <g transform="translate(14 14)">
        <text x="0" y="13" class="paper-label">TAKE 03 · DOORWAY MOTIF</text>
        <text x="0" y="34" class="paper-muted">Melody · Voice · raw timing preserved</text>
        <rect x="530" y="0" width="92" height="34" rx="8" fill="#e8e0d4" stroke="#cfc7ba"/><text x="576" y="21" text-anchor="middle" class="paper-label">Original</text>
        <rect x="630" y="0" width="132" height="34" rx="8" fill="#e8e0d4"/><text x="696" y="21" text-anchor="middle" class="paper-muted">Quantized preview</text>
        <rect x="770" y="0" width="84" height="34" rx="8" fill="#e8e0d4"/><text x="812" y="21" text-anchor="middle" class="paper-label">1/16 ⌄</text>
      </g>

      <g transform="translate(14 62)">
        <rect width="854" height="248" rx="10" fill="#fffaf0" stroke="#cfc7ba"/>
        <!-- ruler -->
        <rect x="104" width="750" height="24" fill="#e8e0d4"/>
        <text x="112" y="16" class="paper-muted">1</text><text x="300" y="16" class="paper-muted">2</text><text x="487" y="16" class="paper-muted">3</text><text x="675" y="16" class="paper-muted">4</text>
        <!-- row labels -->
        <g fill="#e8e0d4" stroke="#cfc7ba"><rect y="24" width="104" height="28"/><rect y="52" width="104" height="28"/><rect y="80" width="104" height="28"/><rect y="108" width="104" height="28"/><rect y="136" width="104" height="28"/><rect y="164" width="104" height="28"/></g>
        <g class="paper-label"><text x="14" y="43">▶ A4</text><text x="14" y="71">▶ G4</text><text x="14" y="99">▶ F4</text><text x="14" y="127">▶ E4</text><text x="14" y="155">▶ D4</text><text x="14" y="183">▶ C4</text></g>
        <!-- grid -->
        <rect x="104" y="24" width="750" height="168" fill="#fffaf0"/>
        <rect x="104" y="24" width="375" height="168" fill="#6687bd" opacity=".08"/>
        <rect x="104" y="24" width="375" height="168" fill="none" stroke="#6687bd" stroke-width="2"/>
        <g stroke="#ded6ca"><path d="M104 52H854 M104 80H854 M104 108H854 M104 136H854 M104 164H854 M104 192H854"/><path d="M151 24V192 M198 24V192 M245 24V192 M292 24V192 M339 24V192 M386 24V192 M433 24V192 M479 24V192 M526 24V192 M573 24V192 M620 24V192 M667 24V192 M714 24V192 M761 24V192 M808 24V192"/></g>
        <g stroke="#aaa397"><path d="M292 24V192 M479 24V192 M667 24V192"/></g>
        <g fill="#c68b50"><rect x="117" y="169" width="53" height="13" rx="4"/><rect x="178" y="141" width="33" height="13" rx="4"/><rect x="220" y="113" width="82" height="13" rx="4"/><rect x="312" y="85" width="58" height="13" rx="4"/><rect x="382" y="113" width="70" height="13" rx="4"/><rect x="496" y="57" width="88" height="13" rx="4"/><rect x="597" y="85" width="51" height="13" rx="4"/><rect x="660" y="113" width="106" height="13" rx="4"/><rect x="778" y="141" width="62" height="13" rx="4"/></g>
        <!-- velocity -->
        <rect x="0" y="202" width="854" height="46" fill="#e8e0d4"/>
        <text x="14" y="225" class="paper-label">Velocity</text><text x="14" y="241" class="paper-muted">selection</text>
        <g stroke="#c68b50" stroke-width="5"><path d="M130 241V221 M189 241V226 M244 241V213 M328 241V218 M399 241V211 M529 241V220 M613 241V214 M706 241V207 M811 241V217"/></g>
      </g>
      <g transform="translate(14 324)">
        <text x="0" y="16" class="paper-label">Selected · bars 1–2</text><text x="142" y="16" class="paper-muted">9 notes · 8 beats · no boundary conflicts</text>
        <rect x="694" width="160" height="36" rx="10" fill="#dca65c"/><text x="774" y="23" text-anchor="middle" class="button" fill="#211a10">Place in song →</text>
      </g>
    </g>

    <!-- Inspector -->
    <rect x="1154" y="64" width="286" height="896" fill="#1d1f1b"/>
    <g transform="translate(1178 94)">
      <text x="0" y="10" class="eyebrow">PLACE IN SONG</text>
      <text x="0" y="45" class="inspector-title">Bars 1–2 of Take 03</text>
      <text x="0" y="70" class="body">Preview the destination before changing the arrangement.</text>
      <line x1="0" y1="92" x2="238" y2="92" stroke="#34372f"/>

      <text x="0" y="122" class="eyebrow">SOURCE RANGE</text>
      <rect x="0" y="136" width="238" height="40" rx="9" fill="#2b2e28" stroke="#4a4f44"/>
      <text x="12" y="160" class="label">Bars 1–2 · 8 beats</text><text x="224" y="160" text-anchor="end" class="muted">Edit</text>

      <text x="0" y="208" class="eyebrow">DESTINATION</text>
      <text x="0" y="239" class="muted">Track</text><rect x="0" y="250" width="238" height="40" rx="9" fill="#2b2e28" stroke="#4a4f44"/><text x="12" y="274" class="label">Melody · Voice</text><text x="224" y="274" text-anchor="end" class="muted">⌄</text>
      <text x="0" y="319" class="muted">Section</text><rect x="0" y="330" width="238" height="40" rx="9" fill="#2b2e28" stroke="#4a4f44"/><circle cx="15" cy="350" r="4" fill="#dca65c"/><text x="28" y="354" class="label">Verse 1 · 8 bars</text><text x="224" y="354" text-anchor="end" class="muted">⌄</text>
      <text x="0" y="399" class="muted">Start</text><rect x="0" y="410" width="238" height="40" rx="9" fill="#2b2e28" stroke="#4a4f44"/><text x="12" y="434" class="label">Bar 1 · beat 1</text><text x="224" y="434" text-anchor="end" class="muted">⌄</text>

      <text x="0" y="482" class="eyebrow">IF NOTES ALREADY EXIST</text>
      <g transform="translate(0 496)"><rect width="238" height="38" rx="9" fill="#4a4333" stroke="#dca65c"/><circle cx="17" cy="19" r="6" fill="#dca65c"/><circle cx="17" cy="19" r="2.5" fill="#211a10"/><text x="31" y="23" class="label">Create section variation</text></g>
      <g transform="translate(0 542)"><rect width="238" height="38" rx="9" fill="#252722"/><circle cx="17" cy="19" r="6" fill="none" stroke="#777c72"/><text x="31" y="23" class="muted">Add to existing notes</text></g>
      <g transform="translate(0 588)"><rect width="238" height="38" rx="9" fill="#252722"/><circle cx="17" cy="19" r="6" fill="none" stroke="#777c72"/><text x="31" y="23" class="muted">Replace this range</text></g>

      <g transform="translate(0 648)">
        <rect width="238" height="104" rx="12" fill="#20221e" stroke="#34372f"/>
        <text x="14" y="25" class="eyebrow">PREVIEW</text>
        <text x="14" y="49" class="label">Voice · Verse 1</text>
        <rect x="14" y="61" width="210" height="23" rx="6" fill="#4b4031"/>
        <g fill="#dca65c"><rect x="24" y="72" width="26" height="4" rx="2"/><rect x="56" y="67" width="19" height="4" rx="2"/><rect x="82" y="70" width="44" height="4" rx="2"/></g>
        <text x="14" y="96" class="tiny">Fits · no notes cross section boundary</text>
      </g>

      <rect x="0" y="772" width="238" height="44" rx="11" fill="#dca65c"/>
      <text x="119" y="799" text-anchor="middle" class="button" fill="#211a10">Place selection in Verse 1</text>
      <text x="119" y="840" text-anchor="middle" class="muted">The original draft will remain unchanged.</text>
    </g>

    <!-- Transport -->
    <rect y="960" width="1440" height="64" fill="#20221e"/>
    <text x="24" y="992" class="label">MIDI ready</text><text x="24" y="1008" class="tiny">KeyLab Essential 49 · receiving</text>
    <rect x="520" y="973" width="112" height="38" rx="10" fill="#2b2e28" stroke="#4a4f44"/><text x="576" y="997" text-anchor="middle" class="button" fill="#d6d7d0">▶ Play take</text>
    <rect x="642" y="973" width="112" height="38" rx="10" fill="#d46f80"/><circle cx="662" cy="992" r="5" fill="#f4f1e9"/><text x="704" y="997" text-anchor="middle" class="button" fill="#2c171b">Record</text>
    <text x="786" y="998" class="label">92</text><text x="808" y="998" class="muted">BPM</text><text x="862" y="998" class="muted">4/4</text><text x="906" y="998" class="muted">D minor</text>
    <rect x="1008" y="982" width="210" height="18" rx="9" fill="#2b2e28"/><rect x="1008" y="982" width="96" height="18" rx="9" fill="#4b4031"/><circle cx="1104" cy="991" r="5" fill="#dca65c"/>
    <text x="1232" y="997" class="muted">Take 03 · bars 1–2 selected</text>
  </g>
</svg>
