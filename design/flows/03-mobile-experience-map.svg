<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Composer compact mobile experience map</title>
  <desc id="desc">The existing Composer workflow grouped into five compact navigation destinations, with local setup steps, a persistent transport, and supporting context in a bottom sheet.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 10 5 0 10z" fill="#777c72"/>
    </marker>
    <style>
      .ui{font-family:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.h1{font-size:36px;font-weight:650;fill:#f4f1e9}.h2{font-size:19px;font-weight:700;fill:#f4f1e9}.body{font-size:14px;fill:#cfd1c9}.small{font-size:11px;font-weight:800;letter-spacing:.1em;fill:#90958b}.paper-title{font-size:17px;font-weight:750;fill:#292b25}.paper-copy{font-size:12px;fill:#696d64}.nav{font-size:11px;font-weight:750;fill:#d6d7d0}
    </style>
  </defs>
  <rect width="1600" height="1000" fill="#171916"/>
  <g class="ui">
    <text x="60" y="58" class="small">COMPOSER &#xB7; COMPACT EXPERIENCE</text>
    <text x="60" y="102" class="h1">Same songmaking flow, one focused pane at a time</text>
    <text x="1540" y="92" class="body" text-anchor="end">Compact width &lt; 600 px &#xB7; Material-adaptive draft</text>
    <text x="60" y="168" class="small">PRIMARY DESTINATIONS</text>
    <line x1="60" y1="184" x2="1540" y2="184" stroke="#34372f"/>
    <g transform="translate(60 220)">
      <g>
        <rect width="250" height="168" rx="22" fill="#f4efe5"/>
        <circle cx="30" cy="32" r="16" fill="#dca65c"/>
        <text x="30" y="37" text-anchor="middle" font-size="13" font-weight="800" fill="#211a10">1</text>
        <text x="58" y="38" class="paper-title">Setup</text>
        <text x="24" y="76" class="paper-copy">Story &#xB7; Frame &#xB7; Emotions</text>
        <text x="24" y="98" class="paper-copy">Local step strip keeps free navigation.</text>
        <g transform="translate(24 120)">
          <rect width="60" height="26" rx="13" fill="#2b2e28"/>
          <rect x="70" width="60" height="26" rx="13" fill="#e5dccd"/>
          <rect x="140" width="62" height="26" rx="13" fill="#e5dccd"/>
          <text x="30" y="17" text-anchor="middle" class="nav" fill="#fff">Story</text>
          <text x="100" y="17" text-anchor="middle" font-size="10" fill="#62665d">Frame</text>
          <text x="171" y="17" text-anchor="middle" font-size="10" fill="#62665d">Feel</text>
        </g>
      </g>
      <path d="M250 84h54" stroke="#777c72" stroke-width="2" marker-end="url(#arrow)"/>
      <g transform="translate(318)">
        <rect width="220" height="168" rx="22" fill="#20221e" stroke="#3a3d35"/>
        <circle cx="30" cy="32" r="16" fill="#2b2e28"/>
        <text x="30" y="37" text-anchor="middle" font-size="13" font-weight="800" fill="#f4f1e9">2</text>
        <text x="58" y="38" class="h2">Map</text>
        <text x="24" y="76" class="body">Structure + emotional arc</text>
        <g transform="translate(24 106)">
          <rect width="44" height="30" rx="7" fill="#51493d"/>
          <rect x="50" width="58" height="30" rx="7" fill="#3a4658"/>
          <rect x="114" width="58" height="30" rx="7" fill="#5d3941"/>
        </g>
      </g>
      <path d="M538 84h54" stroke="#777c72" stroke-width="2" marker-end="url(#arrow)"/>
      <g transform="translate(606)">
        <rect width="250" height="168" rx="22" fill="#f4efe5"/>
        <circle cx="30" cy="32" r="16" fill="#2b2e28"/>
        <text x="30" y="37" text-anchor="middle" font-size="13" font-weight="800" fill="#f4f1e9">3</text>
        <text x="58" y="38" class="paper-title">Compose</text>
        <text x="24" y="76" class="paper-copy">Write &#xB7; place chords &#xB7; audition</text>
        <rect x="24" y="100" width="202" height="46" rx="12" fill="#fffaf0" stroke="#ded6c8"/>
        <text x="38" y="120" font-size="9" font-weight="800" fill="#73776d">VERSE &#xB7; PHRASE 2</text>
        <text x="38" y="139" font-family="Georgia,serif" font-size="13" fill="#292b25">I left the doorway lit&#x2026;</text>
      </g>
      <path d="M856 84h54" stroke="#777c72" stroke-width="2" marker-end="url(#arrow)"/>
      <g transform="translate(924)">
        <rect width="250" height="168" rx="22" fill="#20221e" stroke="#3a3d35"/>
        <circle cx="30" cy="32" r="16" fill="#2b2e28"/>
        <text x="30" y="37" text-anchor="middle" font-size="13" font-weight="800" fill="#f4f1e9">4</text>
        <text x="58" y="38" class="h2">Arrange</text>
        <text x="24" y="76" class="body">Tracks &#xB7; sections &#xB7; sequences</text>
        <g transform="translate(24 104)" stroke="#4a4f44">
          <rect width="202" height="34" rx="8" fill="#2b2e28"/>
          <path d="M50 0v34M76 0v34M102 0v34M128 0v34M154 0v34"/>
          <path d="M50 17h104" stroke="#dca65c" stroke-width="6"/>
        </g>
      </g>
      <path d="M1174 84h54" stroke="#777c72" stroke-width="2" marker-end="url(#arrow)"/>
      <g transform="translate(1242)">
        <rect width="238" height="168" rx="22" fill="#20221e" stroke="#3a3d35"/>
        <circle cx="30" cy="32" r="16" fill="#2b2e28"/>
        <text x="30" y="37" text-anchor="middle" font-size="13" font-weight="800" fill="#f4f1e9">5</text>
        <text x="58" y="38" class="h2">Export</text>
        <text x="24" y="76" class="body">Project JSON &#xB7; MIDI tracks</text>
        <rect x="24" y="105" width="190" height="40" rx="11" fill="#dca65c"/>
        <text x="119" y="130" text-anchor="middle" font-size="12" font-weight="800" fill="#211a10">Export multitrack MIDI</text>
      </g>
    </g>
    <text x="60" y="460" class="small">COMPACT SHELL</text>
    <line x1="60" y1="476" x2="1540" y2="476" stroke="#34372f"/>
    <g transform="translate(60 514)">
      <rect width="500" height="354" rx="28" fill="#20221e" stroke="#4a4f44"/>
      <rect width="500" height="56" rx="28" fill="#20221e"/>
      <rect y="40" width="500" height="16" fill="#20221e"/>
      <circle cx="26" cy="28" r="8" fill="#dca65c"/>
      <text x="46" y="34" class="h2">The Long Road Within</text>
      <text x="470" y="34" text-anchor="end" class="body">&#x21B6;  &#x21B7;</text>
      <rect x="16" y="72" width="468" height="172" rx="18" fill="#f4efe5"/>
      <text x="36" y="104" class="paper-title">Focused creative canvas</text>
      <text x="36" y="132" class="paper-copy">One vertical scroll &#xB7; 16 px margins</text>
      <text x="36" y="154" class="paper-copy">No persistent side panes on compact width</text>
      <rect x="36" y="182" width="132" height="48" rx="12" fill="#2b2e28"/>
      <text x="102" y="211" text-anchor="middle" class="nav">Primary action</text>
      <rect x="380" y="182" width="84" height="48" rx="24" fill="#e5dccd"/>
      <text x="422" y="211" text-anchor="middle" font-size="11" font-weight="800" fill="#55594f">Context</text>
      <rect y="254" width="500" height="48" fill="#2b2e28"/>
      <text x="24" y="283" class="body">Ready</text>
      <rect x="202" y="260" width="104" height="36" rx="12" fill="#dca65c"/>
      <text x="254" y="283" text-anchor="middle" font-size="11" font-weight="800" fill="#211a10">&#x25B6; Play song</text>
      <text x="476" y="283" text-anchor="end" class="body">92 BPM</text>
      <rect y="302" width="500" height="52" rx="0 0 28 28" fill="#1b1d19"/>
      <g class="nav" text-anchor="middle">
        <text x="50" y="334" fill="#dca65c">Setup</text>
        <text x="150" y="334">Map</text>
        <text x="250" y="334">Compose</text>
        <text x="350" y="334">Arrange</text>
        <text x="450" y="334">Export</text>
      </g>
    </g>
    <g transform="translate(620 514)">
      <text class="h2" x="0" y="22">Supporting context becomes a sheet</text>
      <text class="body" x="0" y="54">Project intent, emotion compass, selected note and long action lists</text>
      <text class="body" x="0" y="76">stay available without shrinking the active writing or sequencing pane.</text>
      <rect y="108" width="860" height="236" rx="24" fill="#20221e" stroke="#3a3d35"/>
      <rect y="174" width="860" height="170" rx="24" fill="#f4efe5"/>
      <rect x="390" y="188" width="80" height="5" rx="3" fill="#b9b1a4"/>
      <text x="28" y="222" class="small" fill="#73776d">CONTEXT &#xB7; SELECTED NOTE</text>
      <text x="28" y="256" class="paper-title">D4 &#xB7; Soft piano</text>
      <text x="28" y="286" class="paper-copy">Starts at beat 4.0 &#xB7; length 1 beat &#xB7; velocity 84</text>
      <rect x="650" y="244" width="178" height="48" rx="12" fill="#2b2e28"/>
      <text x="739" y="273" text-anchor="middle" class="nav">Edit note properties</text>
      <text x="28" y="322" class="paper-copy">Swipe down, tap the scrim, press Escape, or use Close.</text>
    </g>
    <text x="60" y="936" class="small">CONTINUITY</text>
    <text x="180" y="936" class="body">All routes, project data, undo history, autosave, playback, and export behavior remain shared with desktop.</text>
  </g>
</svg>
