<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Composer end-to-end experience map</title>
  <desc id="desc">A flow from story through emotion, structure, phrase composition, arrangement, local saving, and multitrack MIDI export, including optional and iterative paths.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#767b71"/>
    </marker>
    <marker id="arrowWarm" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#d8a45e"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <style>
      .ui { font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .h1 { font-size: 34px; font-weight: 600; fill: #f4f1e9; }
      .h2 { font-size: 18px; font-weight: 600; fill: #f4f1e9; }
      .body { font-size: 14px; fill: #cfd1c9; }
      .small { font-size: 12px; font-weight: 600; letter-spacing: .04em; fill: #92968d; }
      .node-title { font-size: 16px; font-weight: 600; fill: #2a2b25; }
      .node-copy { font-size: 12px; fill: #666a61; }
      .chip { font-size: 11px; font-weight: 600; fill: #3d4038; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="#171916"/>
  <g class="ui">
    <text x="60" y="58" class="small">COMPOSER · PRODUCT FLOW</text>
    <text x="60" y="96" class="h1">From emotional intent to a playable song</text>
    <text x="1540" y="86" text-anchor="end" class="body">Guided when useful · freeform when preferred</text>
  </g>

  <g transform="translate(60 148)" class="ui">
    <text x="0" y="0" class="small">CREATIVE INTENT</text>
    <line x1="0" y1="14" x2="1480" y2="14" stroke="#34372f"/>

    <path d="M250 122 H318" fill="none" stroke="#767b71" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M508 122 H576" fill="none" stroke="#767b71" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M766 122 H834" fill="none" stroke="#767b71" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M1024 122 H1092" fill="none" stroke="#767b71" stroke-width="2" marker-end="url(#arrow)"/>

    <g transform="translate(0 48)" filter="url(#shadow)">
      <rect width="250" height="148" rx="18" fill="#f4efe5"/>
      <circle cx="28" cy="30" r="16" fill="#292b26"/>
      <text x="28" y="35" text-anchor="middle" font-size="13" font-weight="600" fill="#f4efe5">1</text>
      <text x="54" y="36" class="node-title">Story</text>
      <text x="24" y="70" class="node-copy">Write freely or label optional</text>
      <text x="24" y="90" class="node-copy">narrative beats and turning points.</text>
      <rect x="24" y="110" width="96" height="24" rx="12" fill="#e5dccd"/>
      <text x="72" y="126" text-anchor="middle" class="chip">artist-authored</text>
    </g>

    <g transform="translate(318 48)" filter="url(#shadow)">
      <rect width="190" height="148" rx="18" fill="#f4efe5"/>
      <circle cx="28" cy="30" r="16" fill="#292b26"/>
      <text x="28" y="35" text-anchor="middle" font-size="13" font-weight="600" fill="#f4efe5">2</text>
      <text x="54" y="36" class="node-title">Frame</text>
      <text x="24" y="70" class="node-copy">Genre, meter, tempo,</text>
      <text x="24" y="90" class="node-copy">rhythmic identity.</text>
      <rect x="24" y="110" width="76" height="24" rx="12" fill="#e5dccd"/>
      <text x="62" y="126" text-anchor="middle" class="chip">optional</text>
    </g>

    <g transform="translate(576 48)" filter="url(#shadow)">
      <rect width="190" height="148" rx="18" fill="#f4efe5"/>
      <circle cx="28" cy="30" r="16" fill="#6687bd"/>
      <text x="28" y="35" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">3</text>
      <text x="54" y="36" class="node-title">Emotions</text>
      <text x="24" y="70" class="node-copy">One major family and up to</text>
      <text x="24" y="90" class="node-copy">three featured emotions.</text>
      <circle cx="36" cy="122" r="8" fill="#6687bd"/>
      <circle cx="58" cy="122" r="8" fill="#d46f80"/>
      <circle cx="80" cy="122" r="8" fill="#c68b50"/>
    </g>

    <g transform="translate(834 48)" filter="url(#shadow)">
      <rect width="190" height="148" rx="18" fill="#f4efe5"/>
      <circle cx="28" cy="30" r="16" fill="#292b26"/>
      <text x="28" y="35" text-anchor="middle" font-size="13" font-weight="600" fill="#f4efe5">4</text>
      <text x="54" y="36" class="node-title">Arc</text>
      <text x="24" y="70" class="node-copy">Shape emotional intensity</text>
      <text x="24" y="90" class="node-copy">across the song.</text>
      <path d="M24 126 C55 122 58 104 88 112 S138 136 166 102" fill="none" stroke="#6687bd" stroke-width="3"/>
    </g>

    <g transform="translate(1092 48)" filter="url(#shadow)">
      <rect width="250" height="148" rx="18" fill="#f4efe5"/>
      <circle cx="28" cy="30" r="16" fill="#292b26"/>
      <text x="28" y="35" text-anchor="middle" font-size="13" font-weight="600" fill="#f4efe5">5</text>
      <text x="54" y="36" class="node-title">Structure</text>
      <text x="24" y="70" class="node-copy">Choose a template or arrange</text>
      <text x="24" y="90" class="node-copy">sections manually.</text>
      <g transform="translate(24 110)">
        <rect width="42" height="24" rx="6" fill="#ded5c6"/><rect x="48" width="42" height="24" rx="6" fill="#d8a45e"/><rect x="96" width="52" height="24" rx="6" fill="#d46f80"/><rect x="154" width="48" height="24" rx="6" fill="#6687bd"/>
      </g>
    </g>

    <path d="M1217 196 V252 H322 V302" fill="none" stroke="#d8a45e" stroke-width="3" marker-end="url(#arrowWarm)"/>
    <text x="770" y="238" text-anchor="middle" class="small" fill="#d8a45e">STRUCTURE CREATES ORDERED PHRASE GROUPS</text>
  </g>

  <g transform="translate(60 454)" class="ui">
    <text x="0" y="0" class="small">COMPOSITION LOOP</text>
    <line x1="0" y1="14" x2="1480" y2="14" stroke="#34372f"/>

    <g transform="translate(0 48)" filter="url(#shadow)">
      <rect width="660" height="280" rx="22" fill="#20221e" stroke="#3a3d35"/>
      <text x="28" y="38" class="h2">Phrase Workspace</text>
      <text x="632" y="38" text-anchor="end" class="small">DETERMINISTIC · TIMELINE-BACKED</text>
      <rect x="28" y="62" width="604" height="132" rx="16" fill="#f4efe5"/>
      <rect x="28" y="62" width="7" height="132" rx="4" fill="#6687bd"/>
      <text x="52" y="88" class="node-copy" font-weight="600">VERSE 1 · PHRASE 03</text>
      <text x="52" y="117" font-size="12" font-weight="600" fill="#7a5d35">Dm</text>
      <text x="260" y="117" font-size="12" font-weight="600" fill="#7a5d35">Bb</text>
      <text x="52" y="150" font-family="Georgia, serif" font-size="23" fill="#2a2b25">I left the light beside the doorway</text>
      <rect x="52" y="164" width="94" height="22" rx="8" fill="#302a20"/>
      <text x="99" y="179" text-anchor="middle" font-size="11" font-weight="600" fill="#f4efe5">▶ PLAY</text>
      <text x="600" y="179" text-anchor="end" class="node-copy">Shift + Enter</text>
      <g transform="translate(28 220)">
        <rect width="112" height="34" rx="10" fill="#2a2d27"/><text x="56" y="22" text-anchor="middle" class="body">write</text>
        <path d="M120 17 H150" stroke="#767b71" marker-end="url(#arrow)"/>
        <rect x="158" width="112" height="34" rx="10" fill="#2a2d27"/><text x="214" y="22" text-anchor="middle" class="body">place chords</text>
        <path d="M278 17 H308" stroke="#767b71" marker-end="url(#arrow)"/>
        <rect x="316" width="112" height="34" rx="10" fill="#2a2d27"/><text x="372" y="22" text-anchor="middle" class="body">audition</text>
        <path d="M436 17 H466" stroke="#767b71" marker-end="url(#arrow)"/>
        <rect x="474" width="130" height="34" rx="10" fill="#4a3825"/><text x="539" y="22" text-anchor="middle" class="body">keep or vary</text>
      </g>
    </g>

    <path d="M660 186 H738" stroke="#d8a45e" stroke-width="3" marker-end="url(#arrowWarm)"/>

    <g transform="translate(738 48)" filter="url(#shadow)">
      <rect width="604" height="280" rx="22" fill="#20221e" stroke="#3a3d35"/>
      <text x="28" y="38" class="h2">Arrangement</text>
      <text x="576" y="38" text-anchor="end" class="small">GLOBAL SONG VIEW</text>
      <g transform="translate(28 68)">
        <text x="0" y="18" class="small">SECTION</text>
        <rect x="92" width="92" height="30" rx="6" fill="#51493d"/><text x="138" y="20" text-anchor="middle" class="body">Intro</text>
        <rect x="190" width="132" height="30" rx="6" fill="#3a4658"/><text x="256" y="20" text-anchor="middle" class="body">Verse</text>
        <rect x="328" width="132" height="30" rx="6" fill="#5d3941"/><text x="394" y="20" text-anchor="middle" class="body">Chorus</text>
        <rect x="466" width="82" height="30" rx="6" fill="#4d3f59"/><text x="507" y="20" text-anchor="middle" class="body">Bridge</text>
      </g>
      <g transform="translate(28 118)">
        <text x="0" y="20" class="small">HARMONY</text><rect x="92" width="456" height="32" rx="8" fill="#292b26"/><path d="M106 22 H194 M212 22 H280 M300 22 H388 M410 22 H530" stroke="#d8a45e" stroke-width="7" stroke-linecap="round"/>
        <text x="0" y="70" class="small">BASS</text><rect x="92" y="50" width="456" height="32" rx="8" fill="#292b26"/><path d="M106 71 H176 M194 71 H272 M292 71 H372 M392 71 H530" stroke="#6687bd" stroke-width="7" stroke-linecap="round"/>
        <text x="0" y="120" class="small">RHYTHM</text><rect x="92" y="100" width="456" height="32" rx="8" fill="#292b26"/><g fill="#55a3a3"><circle cx="112" cy="116" r="5"/><circle cx="146" cy="116" r="5"/><circle cx="180" cy="116" r="5"/><circle cx="214" cy="116" r="5"/><circle cx="248" cy="116" r="5"/><circle cx="282" cy="116" r="5"/><circle cx="316" cy="116" r="5"/><circle cx="350" cy="116" r="5"/><circle cx="384" cy="116" r="5"/><circle cx="418" cy="116" r="5"/><circle cx="452" cy="116" r="5"/><circle cx="486" cy="116" r="5"/><circle cx="520" cy="116" r="5"/></g>
      </g>
    </g>

    <path d="M1038 328 V374 H333 V328" fill="none" stroke="#767b71" stroke-width="2" stroke-dasharray="7 7" marker-end="url(#arrow)"/>
    <text x="690" y="366" text-anchor="middle" class="small">RETURN TO ANY PHRASE WITHOUT LOSING ARRANGEMENT CONTEXT</text>
  </g>

  <g transform="translate(60 866)" class="ui">
    <rect width="1480" height="82" rx="18" fill="#20221e" stroke="#34372f"/>
    <text x="26" y="34" class="small">ONE CANONICAL LOCAL PROJECT</text>
    <text x="26" y="59" class="body">Story · emotions · sections · phrases · chords · rhythm · tracks · alternatives · history</text>
    <path d="M900 41 H982" stroke="#767b71" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="1000" y="20" width="188" height="42" rx="11" fill="#292b26"/>
    <text x="1094" y="46" text-anchor="middle" class="body">Save project JSON</text>
    <path d="M1206 41 H1262" stroke="#767b71" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="1280" y="20" width="174" height="42" rx="11" fill="#d8a45e"/>
    <text x="1367" y="46" text-anchor="middle" font-size="14" font-weight="600" fill="#211a10">Export MIDI tracks</text>
  </g>
</svg>
